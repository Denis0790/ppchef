events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Логи
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;

    # Лимит загрузки файлов (для картинок от пользователей)
    client_max_body_size 20M;

    # Апстримы
    upstream backend  { server backend:8000; }
    upstream frontend { server frontend:3000; }

    # ─── HTTP → HTTPS редирект ──────────────────────────────
    server {
        listen 80;
        server_name ppchef.ru www.ppchef.ru;

        # Для certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS ──────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name ppchef.ru www.ppchef.ru;

        ssl_certificate     /etc/nginx/ssl/live/ppchef.ru/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/ppchef.ru/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # API → FastAPI
        location /api/ {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Всё остальное → Next.js
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }

    # ─── Локальная разработка (без SSL) ─────────────────────
    # Раскомментировать если нужен nginx локально
    # server {
    #     listen 80;
    #     server_name localhost;
    #     location /api/ { proxy_pass http://backend; }
    #     location /     { proxy_pass http://frontend; }
    # }
}
